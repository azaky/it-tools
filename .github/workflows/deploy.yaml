name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t it-tools:latest .

      - name: Import to k3s containerd
        run: |
          docker save it-tools:latest | sudo k3s ctr images import -

      - name: Deploy to k3s
        run: |
          kubectl -n apps rollout restart deploy/it-tools
          kubectl -n apps rollout status deploy/it-tools --timeout=60s
